<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI SOC — Hero Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/tokens.css" />
<style>
  /* Scope hero styles so they render correctly inside artboards */
  .hero { position: relative; overflow: hidden; background: var(--bg); color: var(--text); }
  .hero .ng { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; }
  .hero .dots { position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background-image: radial-gradient(circle at 1px 1px, rgba(148,163,184,0.08) 1px, transparent 0);
    background-size: 32px 32px;
    mask-image: radial-gradient(110% 80% at 50% 0%, #000 40%, transparent 100%); }
  .hero .aurora { position: absolute; inset: 0; z-index: 0; pointer-events: none; background: var(--grad-surface); }
  .hero .nav {
    position: relative; z-index: 5; display: flex; align-items: center; justify-content: space-between;
    height: 64px; padding: 0 36px; border-bottom: 1px solid var(--border-soft);
    background: rgba(10,10,15,0.55); backdrop-filter: blur(12px);
  }
  .hero .brand { display: flex; align-items: center; gap: 11px; font-weight: 700; letter-spacing: -0.01em; font-size: 16px; }
  .hero .logo-mark { width: 28px; height: 28px; border-radius: 8px;
    background: conic-gradient(from 210deg, var(--cyan), var(--violet), var(--cyan));
    display: grid; place-items: center; box-shadow: 0 0 18px rgba(0,212,255,0.4); }
  .hero .logo-mark span { width: 11px; height: 11px; border-radius: 3px; background: #0a0a0f; }
  .hero .nav-links { display: flex; gap: 26px; font-size: 14px; color: var(--text-muted); }
  .hero .nav-links a:hover { color: var(--text); }
  .hero .nav-right { display: flex; align-items: center; gap: 14px; }

  .hero h1 { letter-spacing: -0.035em; line-height: 1.02; margin: 0; font-weight: 700; }
  .hero .lead { color: var(--text-muted); font-size: 18px; line-height: 1.6; }

  /* mock dashboard bits */
  .mock { background: linear-gradient(180deg, rgba(18,18,30,0.94), rgba(11,11,20,0.96));
    border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: 0 30px 80px -30px rgba(0,0,0,0.8), var(--glow-cyan); }
  .mock-bar { display: flex; align-items: center; gap: 8px; padding: 11px 14px; border-bottom: 1px solid var(--border); background: rgba(10,10,16,0.6); }
  .tl { width: 11px; height: 11px; border-radius: 50%; }
  .alert-row { display: flex; align-items: center; gap: 11px; padding: 10px 13px; border-bottom: 1px solid var(--border-soft); font-size: 12.5px; }
  .sev { width: 8px; height: 26px; border-radius: 3px; }
  .mono { font-family: var(--font-mono); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script src="assets/nodegraph.js"></script>

<script type="text/babel">
const { useEffect } = React;

/* ---- shared atoms ---- */
const Brand = () => (
  <div className="brand">
    <div className="logo-mark"><span></span></div>
    AI&nbsp;SOC
  </div>
);

const Nav = () => (
  <nav className="nav">
    <Brand />
    <div className="nav-links">
      <a>Features</a><a>Downloads</a><a>Pricing</a><a>Docs</a>
    </div>
    <div className="nav-right">
      <a style={{ fontSize: 14, color: "var(--text-muted)" }}>Sign in</a>
      <a className="btn btn--primary" style={{ padding: "9px 16px", fontSize: 13.5 }}>Download Free</a>
    </div>
  </nav>
);

const Stat = ({ v, l }) => (
  <div style={{ textAlign: "center" }}>
    <div className="grad-text" style={{ fontSize: 30, fontWeight: 700, letterSpacing: "-0.02em" }}>{v}</div>
    <div style={{ fontSize: 12.5, color: "var(--text-dim)", marginTop: 3, letterSpacing: "0.02em" }}>{l}</div>
  </div>
);

const STATS = [
  ["1100+", "EPS throughput"], ["8", "Parallel AI agents"],
  ["85%", "Confidence auto-response"], ["100%", "Air-gapped"],
];

const AlertRow = ({ color, sev, name, t }) => (
  <div className="alert-row">
    <div className="sev" style={{ background: color, boxShadow: `0 0 10px ${color}` }}></div>
    <div style={{ flex: 1 }}>
      <div style={{ fontWeight: 600 }}>{name}</div>
      <div className="mono" style={{ color: "var(--text-dim)", fontSize: 11, marginTop: 2 }}>{t}</div>
    </div>
    <span className="pill" style={{ padding: "3px 9px", fontSize: 10.5, color }}>{sev}</span>
  </div>
);

/* small live dashboard mock */
const DashMock = ({ compact }) => (
  <div className="mock" style={{ width: "100%" }}>
    <div className="mock-bar">
      <div className="tl" style={{ background: "#ff5f57" }}></div>
      <div className="tl" style={{ background: "#febc2e" }}></div>
      <div className="tl" style={{ background: "#28c840" }}></div>
      <div className="mono" style={{ marginLeft: 8, fontSize: 11.5, color: "var(--text-dim)" }}>ai-soc · live triage</div>
      <span className="pill pill--success" style={{ marginLeft: "auto", padding: "2px 8px", fontSize: 10 }}>
        <span className="dot" style={{ background: "var(--success)", boxShadow: "0 0 8px var(--success)" }}></span>8 agents online
      </span>
    </div>
    <div style={{ display: "grid", gridTemplateColumns: compact ? "1fr" : "1.3fr 1fr" }}>
      <div style={{ borderRight: compact ? "none" : "1px solid var(--border)" }}>
        <div style={{ padding: "9px 13px", fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--text-dim)", borderBottom: "1px solid var(--border-soft)" }} className="mono">Active alerts</div>
        <AlertRow color="#ef4444" sev="CRITICAL" name="Credential dump — T1003" t="host-04 · 12:40:08" />
        <AlertRow color="#f59e0b" sev="HIGH" name="Lateral movement — T1021" t="host-11 · 12:39:51" />
        <AlertRow color="#00d4ff" sev="MED" name="Suspicious PowerShell — T1059" t="host-02 · 12:39:33" />
        <AlertRow color="#22c55e" sev="AUTO" name="Resolved by agent — playbook #44" t="host-09 · 12:38:20" />
      </div>
      {!compact && (
        <div style={{ padding: 14 }}>
          <div className="mono" style={{ fontSize: 11, color: "var(--text-dim)", marginBottom: 10 }}>AGENT PIPELINE</div>
          {["Ingest","Triage","Enrich","Decide","Respond"].map((s, i) => (
            <div key={s} style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 9 }}>
              <div style={{ width: 9, height: 9, borderRadius: "50%", background: i < 4 ? "var(--cyan)" : "var(--violet)", boxShadow: `0 0 8px ${i<4?"var(--cyan)":"var(--violet)"}` }}></div>
              <div style={{ fontSize: 12, fontWeight: 500 }}>{s}</div>
              <div style={{ flex: 1, height: 3, borderRadius: 9, background: "var(--border)" }}>
                <div style={{ width: `${[100,100,100,72,40][i]}%`, height: "100%", borderRadius: 9, background: "linear-gradient(90deg,var(--cyan),var(--violet))" }}></div>
              </div>
            </div>
          ))}
          <div style={{ marginTop: 12, padding: "10px 12px", borderRadius: 10, background: "rgba(0,212,255,0.06)", border: "1px solid rgba(0,212,255,0.2)" }}>
            <div className="mono" style={{ fontSize: 11, color: "var(--cyan)" }}>Confidence 0.91 → AUTO-RESPOND</div>
            <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 3 }}>Isolating host-04, rotating creds…</div>
          </div>
        </div>
      )}
    </div>
  </div>
);

/* ============ HERO A — centered classic ============ */
const HeroA = () => (
  <div className="hero" style={{ height: 760 }}>
    <canvas data-nodegraph data-density="0.00010" className="ng"></canvas>
    <div className="dots"></div><div className="aurora"></div>
    <Nav />
    <div style={{ position: "relative", zIndex: 4, textAlign: "center", maxWidth: 880, margin: "0 auto", padding: "84px 24px 0" }}>
      <span className="pill pill--cyan"><span className="dot"></span>v1.0.0 — now air-gapped & autonomous</span>
      <h1 style={{ fontSize: 64, marginTop: 26 }}>
        Autonomous Threat Response.<br/><span className="grad-text">Zero Internet Required.</span>
      </h1>
      <p className="lead" style={{ maxWidth: 620, margin: "22px auto 0" }}>
        A fully air-gapped, multi-agent Security Operations Centre. Eight LangGraph agents triage, enrich, and respond to threats locally — no cloud, no telemetry, no exfil risk.
      </p>
      <div style={{ display: "flex", gap: 14, justifyContent: "center", marginTop: 34 }}>
        <a className="btn btn--primary btn--lg">Download for Windows</a>
        <a className="btn btn--ghost btn--lg">View on GitHub</a>
      </div>
      <div style={{ display: "flex", justifyContent: "center", gap: 56, marginTop: 64, paddingTop: 30, borderTop: "1px solid var(--border-soft)", maxWidth: 760, margin: "64px auto 0" }}>
        {STATS.map(([v, l]) => <Stat key={l} v={v} l={l} />)}
      </div>
    </div>
  </div>
);

/* ============ HERO B — split + live dashboard ============ */
const HeroB = () => (
  <div className="hero" style={{ height: 760 }}>
    <canvas data-nodegraph data-density="0.00008" className="ng"></canvas>
    <div className="dots"></div><div className="aurora"></div>
    <Nav />
    <div style={{ position: "relative", zIndex: 4, display: "grid", gridTemplateColumns: "1fr 1.02fr", gap: 48, alignItems: "center", padding: "60px 56px 0", maxWidth: 1280, margin: "0 auto" }}>
      <div>
        <span className="pill pill--violet"><span className="dot" style={{ background: "var(--violet)", boxShadow: "0 0 10px var(--violet)" }}></span>LangGraph multi-agent pipeline</span>
        <h1 style={{ fontSize: 56, marginTop: 22 }}>
          Autonomous threat response. <span className="grad-text">Zero internet required.</span>
        </h1>
        <p className="lead" style={{ marginTop: 20 }}>
          Deploy a complete SOC inside your air gap. Eight AI agents run Wazuh → Kafka → response in parallel, escalating to humans only when confidence drops below 85%.
        </p>
        <div style={{ display: "flex", gap: 13, marginTop: 30 }}>
          <a className="btn btn--primary btn--lg">Download for Windows</a>
          <a className="btn btn--ghost btn--lg">View on GitHub</a>
        </div>
        <div style={{ display: "flex", gap: 40, marginTop: 40 }}>
          {STATS.slice(0,3).map(([v,l]) => <Stat key={l} v={v} l={l} />)}
        </div>
      </div>
      <div style={{ animation: "float-y 7s ease-in-out infinite" }}><DashMock /></div>
    </div>
  </div>
);

/* ============ HERO C — bold asymmetric / terminal ============ */
const HeroC = () => (
  <div className="hero" style={{ height: 820 }}>
    <canvas data-nodegraph data-density="0.00012" className="ng"></canvas>
    <div className="dots"></div><div className="aurora"></div>
    <Nav />
    <div style={{ position: "relative", zIndex: 4, padding: "70px 56px 0", maxWidth: 1280, margin: "0 auto" }}>
      <div style={{ display: "grid", gridTemplateColumns: "1.1fr 0.9fr", gap: 40, alignItems: "end" }}>
        <div>
          <span className="pill pill--cyan"><span className="dot"></span>100% air-gapped · no telemetry</span>
          <h1 style={{ fontSize: 76, marginTop: 22, letterSpacing: "-0.045em" }}>
            The SOC that<br/>runs <span className="grad-text">offline.</span>
          </h1>
        </div>
        <div>
          <p className="lead" style={{ fontSize: 17 }}>
            Eight autonomous agents. 1,100+ events per second. Sub-second triage and response — entirely within your network perimeter.
          </p>
          <div style={{ display: "flex", gap: 12, marginTop: 22 }}>
            <a className="btn btn--primary">Download for Windows</a>
            <a className="btn btn--ghost">View on GitHub</a>
          </div>
        </div>
      </div>
      {/* terminal + dashboard strip */}
      <div style={{ display: "grid", gridTemplateColumns: "0.85fr 1.15fr", gap: 18, marginTop: 44 }}>
        <div className="mock" style={{ boxShadow: "0 30px 80px -30px rgba(0,0,0,0.8), var(--glow-violet)" }}>
          <div className="mock-bar">
            <div className="tl" style={{ background: "#ff5f57" }}></div>
            <div className="tl" style={{ background: "#febc2e" }}></div>
            <div className="tl" style={{ background: "#28c840" }}></div>
            <span className="mono" style={{ marginLeft: 8, fontSize: 11.5, color: "var(--text-dim)" }}>bash — ai-soc</span>
          </div>
          <div className="mono" style={{ padding: 16, fontSize: 12.5, lineHeight: 1.9 }}>
            <div><span style={{ color: "var(--violet-bright)" }}>$</span> docker compose up -d</div>
            <div style={{ color: "var(--text-dim)" }}>✓ kafka · redis · vllm · chromadb</div>
            <div style={{ color: "var(--success)" }}>✓ 8 agents online — 1,142 EPS</div>
            <div><span style={{ color: "var(--violet-bright)" }}>$</span> <span style={{ color: "var(--cyan)" }}>ai-soc</span> triage --watch<span style={{ borderLeft: "7px solid var(--cyan)", marginLeft: 2, animation: "glow-pulse 1.1s steps(2) infinite" }}></span></div>
          </div>
        </div>
        <DashMock />
      </div>
    </div>
  </div>
);

function App() {
  useEffect(() => { const t = setTimeout(() => window.bootNodeGraphs && window.bootNodeGraphs(), 60); return () => clearTimeout(t); }, []);
  return (
    <DesignCanvas>
      <DCSection id="heroes" title="AI SOC — Hero Directions" subtitle="Three landing-hero approaches. Pick one (or mix elements) and I'll build the full 5-page site around it.">
        <DCArtboard id="a" label="A · Centered classic — Vercel/Linear, stats bar, node graph" width={1280} height={760}><HeroA /></DCArtboard>
        <DCArtboard id="b" label="B · Split + live dashboard — product-led" width={1280} height={760}><HeroB /></DCArtboard>
        <DCArtboard id="c" label="C · Bold asymmetric + terminal — infra energy" width={1280} height={820}><HeroC /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
